<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Kartu Absen Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Plus Jakarta Sans',Arial,sans-serif; background:#080f1e; min-height:100vh; overflow-x:hidden; color:white; }

/* ═══ SPLASH ═══ */
#splash { position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:#080f1e; }
.s-bg { position:absolute;inset:0;overflow:hidden; }
.orb { position:absolute;border-radius:50%;filter:blur(80px);opacity:.28;animation:drift 9s ease-in-out infinite; }
.orb1 { width:480px;height:480px;background:#1d4ed8;top:-140px;left:-100px; }
.orb2 { width:360px;height:360px;background:#0d9488;bottom:-100px;right:-80px;animation-delay:3.5s; }
.orb3 { width:220px;height:220px;background:#dc2626;top:45%;left:58%;animation-delay:6s; }
@keyframes drift { 0%,100%{transform:translate(0,0)} 50%{transform:translate(18px,-22px)} }
.s-grid { position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:44px 44px; }
.s-inner { position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;animation:riseIn .85s cubic-bezier(.22,1,.36,1) both; }
@keyframes riseIn { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }
.s-badge { display:inline-flex;align-items:center;gap:7px;background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.28);color:#fca5a5;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:5px 15px;border-radius:100px;margin-bottom:18px; }
.s-dot { width:6px;height:6px;background:#ef4444;border-radius:50%;animation:blink 1.5s ease infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }
.s-clock { display:flex;flex-direction:column;align-items:center;margin-bottom:22px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:14px 32px;backdrop-filter:blur(12px); }
.s-time { font-size:42px;font-weight:800;letter-spacing:-1px;color:white;line-height:1;font-variant-numeric:tabular-nums; }
.s-date { font-size:11px;color:#64748b;margin-top:4px;letter-spacing:.5px; }
.s-day  { font-size:10px;color:#ef4444;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-top:2px; }
.s-title { font-size:clamp(36px,9vw,68px);font-weight:800;line-height:1;text-align:center;letter-spacing:-2px;margin-bottom:8px; }
.s-title .t1 { display:block;color:#f1f5f9; }
.s-title .t2 { display:block;background:linear-gradient(90deg,#ef4444,#f97316,#ef4444);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:sweep 3s linear infinite; }
@keyframes sweep { from{background-position:0% center} to{background-position:200% center} }
.s-sub { font-size:13px;color:#475569;margin-bottom:6px;letter-spacing:.3px; }
.s-by  { font-size:11px;color:#ef4444;font-weight:700;letter-spacing:1.5px;margin-bottom:20px;opacity:.8; }
.s-line { width:44px;height:2px;background:linear-gradient(90deg,transparent,#ef4444,transparent);margin-bottom:28px; }
.s-btn { display:flex;align-items:center;gap:10px;padding:15px 40px;background:linear-gradient(135deg,#dc2626,#ef4444);border:none;border-radius:100px;color:white;font-family:inherit;font-size:14px;font-weight:700;letter-spacing:.6px;cursor:pointer;box-shadow:0 0 36px rgba(239,68,68,.28);transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;text-decoration:none; }
.s-btn::after { content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18),transparent);opacity:0;transition:opacity .2s; }
.s-btn:hover { transform:translateY(-3px);box-shadow:0 0 52px rgba(239,68,68,.42); }
.s-btn:hover::after { opacity:1; }
.s-arr { width:18px;height:18px;border:2px solid rgba(255,255,255,.6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;transition:transform .2s; }
.s-btn:hover .s-arr { transform:translateX(3px); }
</style>
</head>
<body>

<!-- ═══ SPLASH ═══ -->
<div id="splash">
  <div class="s-bg">
    <div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
    <div class="s-grid"></div>
  </div>
  <div class="s-inner">
    <div class="s-badge"><span class="s-dot"></span> Kartu Absen Digital</div>
    <div class="s-clock">
      <div class="s-time" id="splashTime">00:00:00</div>
      <div class="s-date" id="splashDate"></div>
      <div class="s-day" id="splashDay"></div>
    </div>
    <h1 class="s-title"><span class="t1">Custom</span><span class="t2">Kartu Absen</span></h1>
    <p class="s-sub">Generator kartu absen sekolah</p>
    <p class="s-by">BY DITZZ</p>
    <div class="s-line"></div>
    <a class="s-btn" href="https://ligshtshot.site/" target="_blank" rel="noopener">
      <span>Buat Kartu Sekarang</span>
      <span class="s-arr">›</span>
    </a>
  </div>
</div>

<script>
const DAYS   = ['MINGGU','SENIN','SELASA','RABU','KAMIS','JUMAT','SABTU'];
const MONTHS = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
function tickSplash(){
  const n=new Date();
  document.getElementById('splashTime').textContent = `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
  document.getElementById('splashDate').textContent = `${n.getDate()} ${MONTHS[n.getMonth()]} ${n.getFullYear()}`;
  document.getElementById('splashDay').textContent  = DAYS[n.getDay()];
}
tickSplash();
setInterval(tickSplash,1000);
</script>
</body>
</html>
