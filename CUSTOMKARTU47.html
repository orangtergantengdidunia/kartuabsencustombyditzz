<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kartu Absen Sekolah</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0f172a;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

/* KARTU */
.card{

  width:242px;
  height:385px;

  background:#ffffff;

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  border-radius:18px;

  overflow:hidden;

  position:relative;

  border:6px solid #ffffff;

}

/* OVERLAY */
.overlay{
  position:absolute;
  inset:0;
  background:rgba(255,255,255,0.12);
  z-index:1;
}

/* MERAH ATAS */
.top-red{
  position:absolute;

  top:0;
  right:0;

  width:155px;
  height:88px;

  background:#ef4444;

  border-bottom-left-radius:110px;

  z-index:2;
}

/* MERAH BAWAH */
.bottom-red{
  position:absolute;

  bottom:0;
  left:0;

  width:155px;
  height:88px;

  background:#ef4444;

  border-top-right-radius:110px;

  z-index:2;
}

/* GARIS PUTIH */
.wave1{
  position:absolute;

  top:38px;
  right:-20px;

  width:200px;
  height:60px;

  border-radius:50%;

  border:2px solid rgba(255,255,255,.5);

  z-index:2;
}

.wave2{
  position:absolute;

  bottom:30px;
  left:-20px;

  width:200px;
  height:60px;

  border-radius:50%;

  border:2px solid rgba(255,255,255,.5);

  z-index:2;
}

/* ISI */
.content{

  position:relative;

  z-index:5;

  text-align:center;

  padding-top:45px;
}

/* FOTO */
.photo{

  width:98px;
  height:118px;

  background:#e5e7eb;

  margin:auto;

  border-radius:14px;

  overflow:hidden;

  border:3px solid #f8f8f8;

}

.photo img{

  width:100%;
  height:100%;

  object-fit:cover;

  border-radius:10px;
}

/* NAMA */
.name{

  margin-top:14px;

  font-size:15px;

  font-weight:900;

  letter-spacing:0.3px;

  color:#222;

  font-family:Arial Black,sans-serif;

  text-shadow:
  0 1px 2px rgba(255,255,255,.4);

}

/* ID */
.id{

  margin-top:7px;

  font-size:17px;

  font-weight:900;

  color:#ef4444;

  font-family:Arial Black,sans-serif;

  letter-spacing:0.5px;

  text-shadow:
  0 1px 2px rgba(255,255,255,.4);

}

/* QR */
.qr{
  margin-top:10px;
}

.qr img{

  width:74px;
  height:74px;

  object-fit:contain;

  background:white;

  padding:2px;

  border-radius:8px;
}

/* FOOTER */
.footer{

  margin-top:8px;

  color:white;

  font-size:9px;

  font-weight:bold;

  letter-spacing:0.3px;

  text-shadow:
  0 0 2px rgba(0,0,0,.6),
  0.4px 0.4px 0 #000,
 -0.4px -0.4px 0 #000,
  0.4px -0.4px 0 #000,
 -0.4px 0.4px 0 #000;

}

/* PANEL */
.panel{

  width:242px;

  background:#1e293b;

  padding:16px;

  margin-top:20px;

  border-radius:16px;
}

input{

  width:100%;

  padding:11px;

  border:none;

  border-radius:10px;

  margin-top:10px;

  font-size:14px;
}

button{

  width:100%;

  padding:11px;

  border:none;

  border-radius:10px;

  margin-top:14px;

  font-size:15px;

  color:white;

  cursor:pointer;
}

.generate{
  background:#0ea5e9;
}

.download{
  background:#16a34a;
}

/* NOTE */
.note{

  margin-top:14px;

  font-size:11px;

  color:#cbd5e1;

  text-align:center;

  line-height:1.5;

}

.note a{

  color:#38bdf8;

  text-decoration:none;

  word-break:break-all;
}

</style>
</head>
<body>

<!-- KARTU -->
<div class="card" id="card">

<div class="overlay"></div>

<div class="top-red"></div>
<div class="bottom-red"></div>

<div class="wave1"></div>
<div class="wave2"></div>

<div class="content">

<!-- FOTO -->
<div class="photo">

<img id="preview"
src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScyMDAnIGhlaWdodD0nMjAwJz4KPHJlY3Qgd2lkdGg9JzEwMCUnIGhlaWdodD0nMTAwJScgZmlsbD0nI2U1ZTdlYicvPgo8Y2lyY2xlIGN4PScxMDAnIGN5PSc3MCcgcj0nMzAnIGZpbGw9JyNiYmJiYmInLz4KPHBhdGggZD0nTTQwIDE2MGMwLTMzIDI3LTYwIDYwLTYwczYwIDI3IDYwIDYwJyBmaWxsPScjYmJiYmJiJy8+Cjwvc3ZnPg==">

</div>

<!-- NAMA -->
<div class="name" id="namaText">
NAMA ANDA
</div>

<!-- ID -->
<div class="id" id="idText">
123456789
</div>

<!-- QR -->
<div class="qr">

<img id="qrPreview"
src="https://api.qrserver.com/v1/create-qr-code/?size=74x74&data=123456789">

</div>

<!-- FOOTER -->
<div class="footer">
smpn47batam.edupus.id
</div>

</div>

</div>

<!-- PANEL -->
<div class="panel">

<input type="text"
id="namaInput"
placeholder="Masukkan nama">

<input type="text"
id="idInput"
placeholder="Masukkan ID">

<label style="color:white;font-size:13px;">
Upload Foto
</label>

<input type="file"
id="fotoInput"
accept="image/*">

<label style="color:white;font-size:13px;">
Upload QR
</label>

<input type="file"
id="qrInput"
accept="image/*">

<label style="color:white;font-size:13px;">
Upload Background
</label>

<input type="file"
id="bgInput"
accept="image/*">

<label style="color:white;font-size:13px;">
Warna Background
</label>

<input type="color"
id="bgColor"
value="#ffffff">

<label style="color:white;font-size:13px;">
Warna Merah Atas & Bawah
</label>

<input type="color"
id="redColor"
value="#ef4444">

<button class="generate"
onclick="buatKartu()">
Buat Kartu
</button>

<button class="download"
onclick="downloadCard()">
Download Kartu
</button>

<!-- NOTE -->
<div class="note">

Jika ingin membuat QR Code sendiri, silakan download aplikasi
<b>Gamma Scan</b> melalui Play Store pada link berikut:

<br><br>

<a href="https://play.google.com/store/apps/details?id=com.gamma.scan" target="_blank">
https://play.google.com/store/apps/details?id=com.gamma.scan
</a>

</div>

</div>

<script>

/* BUAT KARTU */

function buatKartu(){

  const nama =
  document.getElementById("namaInput").value;

  const id =
  document.getElementById("idInput").value;

  if(nama.trim()!=""){

    document.getElementById("namaText")
    .innerText = nama.toUpperCase();

  }

  if(id.trim()!=""){

    document.getElementById("idText")
    .innerText = id;

  }

  /* FOTO */
  const foto =
  document.getElementById("fotoInput").files[0];

  if(foto){

    const reader = new FileReader();

    reader.onload = function(e){

      document.getElementById("preview").src =
      e.target.result;

    }

    reader.readAsDataURL(foto);

  }

  /* QR */
  const qr =
  document.getElementById("qrInput").files[0];

  if(qr){

    const reader2 = new FileReader();

    reader2.onload = function(e){

      document.getElementById("qrPreview").src =
      e.target.result;

    }

    reader2.readAsDataURL(qr);

  }

  /* BACKGROUND */
  const bg =
  document.getElementById("bgInput").files[0];

  const warna =
  document.getElementById("bgColor").value;

  if(bg){

    const reader3 = new FileReader();

    reader3.onload = function(e){

      document.getElementById("card")
      .style.backgroundImage =
      `url('${e.target.result}')`;

    }

    reader3.readAsDataURL(bg);

  }else{

    document.getElementById("card")
    .style.backgroundImage = "none";

    document.getElementById("card")
    .style.backgroundColor = warna;

  }

  /* WARNA MERAH */
  const red =
  document.getElementById("redColor").value;

  document.querySelector(".top-red")
  .style.background = red;

  document.querySelector(".bottom-red")
  .style.background = red;

}

/* DOWNLOAD HD */

function downloadCard(){

  html2canvas(

    document.getElementById("card"),

    {
      scale:5,
      useCORS:true
    }

  ).then(canvas=>{

    const link =
    document.createElement("a");

    link.download =
    "kartu-absen-print.png";

    link.href =
    canvas.toDataURL("image/png");

    link.click();

  });

}

</script>

</body>
</html>
